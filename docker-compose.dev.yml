services:
  backoffice-dev:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_URL=https://dev.api.municipall.dev
    container_name: municipall-backoffice-dev
    restart: always
    ports:
      - "4001:3000"
    networks:
      - proxy-bridge

networks:
  proxy-bridge:
    external: true
